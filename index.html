<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Death by AI – Visual Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0a1a, #0f0c24);
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Floating words background */
        .word-cloud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .floating-word {
            position: absolute;
            font-size: clamp(24px, 6vw, 70px);
            font-weight: bold;
            opacity: 0.08;
            animation: floatWord linear infinite;
            text-shadow: 0 0 12px rgba(255,255,255,0.3);
            white-space: nowrap;
        }
        @keyframes floatWord {
            0% { transform: translateX(-10%) translateY(100vh) rotate(0deg); opacity: 0.05; }
            100% { transform: translateX(110%) translateY(-20vh) rotate(360deg); opacity: 0.12; }
        }

        /* Game card – bigger */
        .game-card {
            position: relative;
            z-index: 10;
            max-width: 620px;
            width: 100%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 32px 28px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* Volume controls – top right */
        .music-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .volume-slider {
            width: 110px;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 8px #a855f7;
        }
        #musicBtn {
            background: #2a235a;
            border: none;
            color: white;
            font-size: 16px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
        }
        #musicBtn.music-playing {
            background: #8b5cf6;
            animation: pulseGlow 1.2s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); }
            70% { box-shadow: 0 0 0 8px rgba(139,92,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
        }

        .screen { display: none; }
        .active-screen { display: block; }

        .main-menu { text-align: center; padding: 20px 10px; }
        h1 {
            font-size: 52px;
            color: white;
            text-shadow: 0 0 25px rgba(168,85,247,0.6);
            margin-bottom: 12px;
        }
        .sub { color: #cbcbff; margin-bottom: 52px; font-size: 18px; }
        .start-btn {
            background: linear-gradient(95deg, #a855f7, #6b21a5);
            border: none;
            padding: 16px 32px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            width: 75%;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168,85,247,0.4);
        }
        .start-btn:active { transform: scale(0.97); }

        .score-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.45);
            padding: 14px 24px;
            border-radius: 80px;
            margin-bottom: 28px;
            color: white;
            font-weight: bold;
        }

        .scenario-box {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 28px 24px;
            margin: 24px 0;
            text-align: center;
        }

        /* Visual Zone: Scenario Image + Player Avatar */
        .visual-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .scene-image {
            width: 110px;
            height: 110px;
            background: #1e1a3a;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .player-avatar {
            width: 90px;
            height: 90px;
            background: #2a235a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 0 3px rgba(168,85,247,0.5);
            animation: idleBob 2s infinite;
        }
        @keyframes idleBob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .vs-badge {
            font-size: 20px;
            font-weight: bold;
            color: #a855f7;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .scenario-text {
            font-size: 19px;
            line-height: 1.45;
            color: #0e0c2a;
            font-weight: 500;
            margin: 15px 0 10px;
        }

        input {
            width: 100%;
            padding: 15px 22px;
            border-radius: 80px;
            border: 2px solid #8b5cf6;
            margin: 18px 0 12px;
            font-size: 16px;
        }
        button.submit {
            background: #10b981;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 80px;
            font-weight: bold;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .thinking {
            text-align: center;
            color: #ccccee;
            margin: 18px;
            display: none;
        }
        .thinking.active { display: block; }

        .result-area {
            background: rgba(0,0,0,0.65);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            margin: 22px 0;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .result-area.show { display: block; }
        .win-text { color: #4ade80; font-size: 30px; font-weight: bold; }
        .lose-text { color: #f87171; font-size: 30px; font-weight: bold; }
        .epic-win { color: #fbbf24; font-size: 30px; font-weight: bold; }
        .next-btn, .share-btn {
            background: #8b5cf6;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 80px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            display: none;
            cursor: pointer;
        }
        .share-btn { background: #1da1f2; }
        .next-btn.show, .share-btn.show { display: block; }
        .footer-note { text-align: center; color: #b0b0dd; font-size: 12px; margin-top: 24px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="word-cloud" id="wordCloud"></div>
    <div class="game-card">
        <div id="mainMenu" class="screen active-screen">
            <div class="main-menu">
                <h1>⚰️ DEATH BY AI</h1>
                <div class="sub">The AI judge will decide your fate...</div>
                <button class="start-btn" id="startGameBtn">▶ START GAME</button>
                <div class="footer-note">v10 · visual scenario · player avatar</div>
            </div>
        </div>
        <div id="gameScreen" class="screen">
            <div class="score-panel">
                <span>🔥 STREAK: <span id="surviveCount">0</span></span>
                <span>🎮 PLAYS: <span id="gameCount">0</span></span>
                <span>🏆 BEST: <span id="highScoreSpan">0</span></span>
            </div>
            <div class="scenario-box">
                <div class="visual-zone">
                    <div class="scene-image" id="sceneImage">❓</div>
                    <div class="vs-badge">VS</div>
                    <div class="player-avatar" id="playerAvatar">❓</div>
                </div>
                <div class="scenario-text" id="scenarioText">Loading...</div>
                <input type="text" id="playerAnswer" placeholder="✍️ What's your move?" maxlength="200">
                <button class="submit" id="submitBtn">⚡ FACE JUDGEMENT</button>
            </div>
            <div id="thinkingMsg" class="thinking">🤖 The AI is weighing your destiny...</div>
            <div id="resultArea" class="result-area">
                <div id="resultTitle"></div>
                <div id="resultComment" class="result-comment"></div>
                <div id="pointsDisplay" class="points-earned"></div>
            </div>
            <button id="nextRoundBtn" class="next-btn">🔄 TRY ANOTHER SCENARIO</button>
            <button id="shareBtn" class="share-btn">📢 SHARE YOUR STORY</button>
        </div>
    </div>

    <div class="music-controls">
        <span class="volume-icon">🎵</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="18">
        <button id="musicBtn">🔇</button>
    </div>

    <script>
        // Floating words background
        const wordsList = ["SURVIVE","PERISH","EPIC","DEATH","AI","STREAK","POINTS","FATE","JUDGE","LIVE","DIE","CHANCE","RISK","FORTUNE","DESTINY","LEGEND","VICTORY","DEFEAT"];
        function createFloatingWords() {
            const cloud = document.getElementById('wordCloud');
            for(let i=0;i<28;i++) {
                const word = wordsList[Math.floor(Math.random()*wordsList.length)];
                const span = document.createElement('div');
                span.className = 'floating-word';
                span.textContent = word;
                span.style.fontSize = (Math.random()*36+22)+'px';
                span.style.left = Math.random()*100+'%';
                span.style.animationDuration = (Math.random()*28+16)+'s';
                span.style.animationDelay = (Math.random()*-45)+'s';
                span.style.opacity = Math.random()*0.07+0.04;
                const colors = ['#a855f7','#4ade80','#f87171','#fbbf24','#60a5fa'];
                span.style.color = colors[Math.floor(Math.random()*colors.length)];
                cloud.appendChild(span);
            }
        }
        createFloatingWords();

        // === SCENARIO VISUAL MAPPER (emoji-based image)
        function getScenarioVisual(text) {
            const t = text.toLowerCase();
            if(t.includes('lion')) return '🦁';
            if(t.includes('phone') || t.includes('uber')) return '📱';
            if(t.includes('email') || t.includes('boss')) return '💼';
            if(t.includes('video call') || t.includes('naked')) return '🎥';
            if(t.includes('ex') || t.includes('photo')) return '💔';
            if(t.includes('food') || t.includes('delivery')) return '🍕';
            if(t.includes('dessert')) return '🍰';
            if(t.includes('roommate')) return '🚪';
            if(t.includes('passport')) return '✈️';
            if(t.includes('train')) return '🚂';
            if(t.includes('airbnb')) return '🏠';
            if(t.includes('hiking') || t.includes('mountain')) return '🥾';
            if(t.includes('hotel')) return '🏨';
            if(t.includes('seagull') || t.includes('sandwich')) return '🕊️🥪';
            if(t.includes('sing')) return '🎤';
            if(t.includes('date')) return '💑';
            if(t.includes('secret')) return '🤐';
            if(t.includes('genie')) return '🪔';
            if(t.includes('smart speaker')) return '📦';
            if(t.includes('dentist')) return '🦷';
            if(t.includes('car')) return '🚗';
            if(t.includes('ghost')) return '👻';
            if(t.includes('lottery')) return '💸';
            if(t.includes('snake')) return '🐍';
            if(t.includes('tsunami')) return '🌊';
            if(t.includes('spy')) return '🕵️';
            if(t.includes('award')) return '🏆';
            if(t.includes('robot')) return '🤖';
            if(t.includes('cake')) return '🎂';
            if(t.includes('artifact')) return '💀';
            if(t.includes('helicopter')) return '🚁';
            if(t.includes('stage')) return '🎭';
            if(t.includes('desert')) return '🌵';
            if(t.includes('penguin')) return '🐧';
            if(t.includes('magician')) return '🪄';
            if(t.includes('christmas')) return '🎄';
            if(t.includes('tv')) return '📺';
            if(t.includes('burger')) return '🍔';
            if(t.includes('bee')) return '🐝';
            if(t.includes('concert')) return '🎸';
            if(t.includes('brain')) return '🧠';
            if(t.includes('alien')) return '🛸';
            if(t.includes('octopus')) return '🐙';
            if(t.includes('death')) return '💀';
            return '❓';
        }

        // SCENARIOS (same 50)
        const scenarios = [
            "🐯 A hungry lion in the room. Only weapon: a squeaky hammer.",
            "📱 Phone dead at 2am in an Uber. Driver is lost and speaks no English.",
            "💼 You accidentally 'reply all' to an email roasting your boss. He's right behind you.",
            "🎥 Naked on a video call. Camera was on. Everyone saw.",
            "💔 You liked your ex's 2016 photo while stalking at 3am. They saw it.",
            "🍕 Wrong food delivery. You're starving. Restaurant isn't answering.",
            "🍰 You forgot dessert at dinner. Standing at their door empty-handed.",
            "🚪 Roommate walks in during a private moment. Silence.",
            "✈️ Passport thrown in trash. Flight in 5 hours. Garbage truck already came.",
            "🚂 Wrong train. Won't stop for 4 hours. Destination unknown.",
            "🏠 Airbnb doesn't exist at 2am. Empty lot. No hotels nearby.",
            "🛂 Passport expired. Flight in 45 minutes. At airport security.",
            "🥾 Lost on mountain trail. No signal. Sun is setting.",
            "🏨 Screaming from next hotel room. No staff around.",
            "🕊️ Seagull stole your sandwich. Mocking you from 3 feet away.",
            "🎤 Friend about to sing terribly. They ask your opinion.",
            "💑 Date looks 10 years older than profile pic. First words?",
            "🤐 Friend told you a secret. Their partner asks you directly.",
            "💍 Called current partner by ex's name. During argument.",
            "👀 See your ex with new partner while you're alone at a restaurant.",
            "💬 'Why did your last relationship end?' on first date.",
            "🍝 Friend's cooking is awful. 'How is it?' with hopeful eyes.",
            "🍱 You ate colleague's grandma-recipe lunch. They're crying.",
            "🪔 Grumpy genie offers terrible wishes. What's your first wish?",
            "📦 Smart speaker ordered 100 pizzas. Delivery guy at door.",
            "🦷 Dentist says 'Open wide' while holding giant pliers.",
            "🚗 Car breaks down in the middle of nowhere. 1% battery left.",
            "👻 Ghost appears at 3am. It wants to be friends.",
            "💸 Lottery ticket worth $1M stuck in vending machine.",
            "🐍 Snake in your shoe. Flight boards in 5 minutes.",
            "🌊 Tsunami warning. 10 minutes to evacuate. Cat is hiding.",
            "🕵️ Spy mistakes you for a double agent. Wants secret codes.",
            "🏆 You accidentally won an award. Speech in 2 minutes.",
            "🤖 Robot vacuum locks you in a room. It's charging.",
            "🎂 Cake for your crush completely collapsed.",
            "💀 Cursed artifact whispers your darkest secret.",
            "🚁 Helicopter pilot asks you to navigate. You've never flown.",
            "🎭 On stage. Script is blank. Audience is waiting.",
            "🌵 Lost in desert. You find a cactus with one straw.",
            "🐧 Penguin follows you home. Refuses to leave.",
            "🪄 Magician pulls you on stage. You have to assist the trick.",
            "🎄 You accidentally set the Christmas tree on fire.",
            "📺 Your TV starts talking. Gives investment advice.",
            "🍔 You ate your friend's last burger. They're crying.",
            "🐝 You're allergic to bees. A bee lands on your nose.",
            "🎸 At a concert. Band pulls you on stage to play drums.",
            "🧠 You wake up as a brain in a jar. Scientists observing you.",
            "🛸 Aliens abduct you. They ask you to rate Earth 1-10.",
            "🐙 Giant octopus grabs your boat. It wants to play chess.",
            "💀 Death himself challenges you to rock-paper-scissors."
        ];

        // Game logic (same as previous working version)
        const surviveKeywords = ["run","hide","help","call","escape","fight","trick","clever","smart","plan","strategy","avoid","dodge","distract","bribe","negotiate","creative","genius","brilliant","outsmart","use","grab","jump","climb","sneak","defend","attack","trap","patience","prepare","tool","weapon","item","fake","pretend","convince","reason","logic","improvise","adapt","survive","live"];
        const perishKeywords = ["cry","panic","freeze","die","scream","give up","pray","scared","afraid","fear","hopeless","useless","can't","no idea","don't know","not sure","nothing","stay","wait","hesitate","confused","lost","unsure","stupid","dumb","idiot","fool","silly","crazy","kill","murder","death","dead","quit","surrender","give in","okay","fine"];
        const winResponses = ["🎉 The AI is IMPRESSED! You survived!","✨ BRILLIANT! The universe applauds your genius.","🔥 You CHEATED DEATH!","🏆 VICTORY!","💪 RESPECT!","🧠 GENIUS MOVE!"];
        const loseResponses = ["😬 OOF. That plan... didn't work.","💀 The AI shakes its head.","🎭 That was... interesting.","😅 The AI is laughing. Not with you, at you.","🧠 The AI expected more."];
        const epicWinResponses = ["🏆 EPIC! The AI bows to your brilliance!","👑 LEGENDARY!","⚡ GOD-TIER!","🌟 UNBELIEVABLE!"];

        let surviveStreak = 0, totalGames = 0;
        let lastResult = { survived: false, comment: "", qualityScore: 0 };
        let highScore = localStorage.getItem('deathAI_hs') ? parseInt(localStorage.getItem('deathAI_hs')) : 0;
        document.getElementById('highScoreSpan').innerText = highScore;
        function updateUI() {
            document.getElementById('surviveCount').innerText = surviveStreak;
            document.getElementById('gameCount').innerText = totalGames;
            document.getElementById('highScoreSpan').innerText = highScore;
        }
        function getRandomScenario() { return scenarios[Math.floor(Math.random() * scenarios.length)]; }
        function loadScenario() {
            const text = getRandomScenario();
            document.getElementById('scenarioText').innerText = text;
            document.getElementById('sceneImage').innerHTML = getScenarioVisual(text);
            document.getElementById('playerAvatar').innerHTML = '❓';
            document.getElementById('playerAnswer').value = '';
            document.getElementById('playerAnswer').disabled = false;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('nextRoundBtn').classList.remove('show');
            document.getElementById('shareBtn').classList.remove('show');
        }
        function calculateQuality(answer) {
            let q = 0;
            if(answer.length>40) q+=6;
            if(answer.split(' ').length>8) q+=5;
            if(answer.includes('what if')) q+=4;
            if(answer.includes('plan')||answer.includes('strategy')) q+=5;
            return Math.min(q,40);
        }
        function judge(answer) {
            let surviveScore=0, perishScore=0;
            const low = answer.toLowerCase();
            surviveKeywords.forEach(k=>{if(low.includes(k)) surviveScore+=2;});
            perishKeywords.forEach(k=>{if(low.includes(k)) perishScore+=2;});
            const quality = calculateQuality(answer);
            surviveScore += Math.floor(quality/4);
            let survived = (surviveScore > perishScore+3) ? true : (perishScore > surviveScore+3) ? false : Math.random()>0.45;
            let comment = survived ? winResponses[Math.floor(Math.random()*winResponses.length)] : loseResponses[Math.floor(Math.random()*loseResponses.length)];
            if(quality>25 && survived) comment = epicWinResponses[Math.floor(Math.random()*epicWinResponses.length)];
            return { survived, comment, qualityScore: quality };
        }
        function submitAnswer() {
            const ans = document.getElementById('playerAnswer').value.trim();
            if(!ans) { alert("Write something!"); return; }
            document.getElementById('playerAnswer').disabled = true;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('thinkingMsg').classList.add('active');
            setTimeout(()=>{
                document.getElementById('thinkingMsg').classList.remove('active');
                const result = judge(ans);
                lastResult = result;
                totalGames++;
                if(result.survived) { surviveStreak++; if(surviveStreak>highScore) { highScore=surviveStreak; localStorage.setItem('deathAI_hs',highScore); } }
                else surviveStreak=0;
                updateUI();
                document.getElementById('playerAvatar').innerHTML = result.survived ? '😎' : '😵';
                const titleDiv = document.getElementById('resultTitle');
                if(result.qualityScore>25 && result.survived) { titleDiv.className='epic-win'; titleDiv.innerText='🏆 EPIC VICTORY! 🏆'; }
                else if(result.survived) { titleDiv.className='win-text'; titleDiv.innerText='✨ VICTORY! ✨'; }
                else { titleDiv.className='lose-text'; titleDiv.innerText='💀 DEFEATED 💀'; }
                document.getElementById('resultComment').innerText = result.comment;
                document.getElementById('pointsDisplay').innerHTML = `📊 Answer Quality: ${result.qualityScore} pts`;
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('nextRoundBtn').classList.add('show');
                document.getElementById('shareBtn').classList.add('show');
            },1000);
        }
        function startGame() {
            document.getElementById('mainMenu').classList.remove('active-screen');
            document.getElementById('gameScreen').classList.add('active-screen');
            surviveStreak=0; totalGames=0;
            updateUI();
            loadScenario();
        }
        function shareResult() {
            const url = "https://smuhammadsaim555-prog.github.io/deathbyai/";
            const text = lastResult.survived ? `🎉 I SURVIVED! Score:${lastResult.qualityScore} | Streak:${surviveStreak}\n${url}` : `💀 I PERISHED... Score:${lastResult.qualityScore}\n${url}`;
            if(navigator.share) navigator.share({title:'Death by AI',text:text,url:url}).catch(()=>prompt("Copy:",text));
            else prompt("Copy:",text);
        }
        // music
        let audioCtx=null, musicActive=false, musicOscs=[], masterGain=null;
        function initMusic() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext||window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value=0.04;
            masterGain.connect(audioCtx.destination);
            [196,261,329,392,440].forEach(f=>{let o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f; let g=audioCtx.createGain(); g.gain.value=0.025; o.connect(g); g.connect(masterGain); musicOscs.push(o);});
            document.getElementById('volumeSlider').addEventListener('input',e=>{if(masterGain) masterGain.gain.value=e.target.value/1000;});
        }
        function toggleMusic() {
            const btn=document.getElementById('musicBtn');
            if(!audioCtx) initMusic();
            if(audioCtx.state==='suspended'||!musicActive){
                audioCtx.resume().then(()=>{musicOscs.forEach(o=>{try{o.start()}catch(e){}}); musicActive=true; btn.innerText='🔊'; btn.classList.add('music-playing'); if(masterGain) masterGain.gain.value=document.getElementById('volumeSlider').value/1000;});
            } else { audioCtx.suspend(); musicActive=false; btn.innerText='🔇'; btn.classList.remove('music-playing'); }
        }
        document.addEventListener('touchstart',()=>{if(!audioCtx) initMusic();},{once:true});
        document.getElementById('musicBtn').onclick=toggleMusic;
        document.getElementById('startGameBtn').onclick=startGame;
        document.getElementById('submitBtn').onclick=submitAnswer;
        document.getElementById('nextRoundBtn').onclick=loadScenario;
        document.getElementById('shareBtn').onclick=shareResult;
    </script>
</body>
</html>
