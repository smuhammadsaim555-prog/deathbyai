<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Death by AI – Animated Icon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0a1a, #0f0c24);
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Floating words background – subtle */
        .word-cloud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-word {
            position: absolute;
            font-size: clamp(20px, 5vw, 50px);
            font-weight: bold;
            opacity: 0.03;
            animation: floatWord linear infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        @keyframes floatWord {
            0% {
                transform: translateX(-10%) translateY(100vh) rotate(0deg);
                opacity: 0.02;
            }
            100% {
                transform: translateX(110%) translateY(-20vh) rotate(360deg);
                opacity: 0.06;
            }
        }

        /* Game card */
        .game-card {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Music controls – bottom-left, discreet */
        .music-controls {
            position: fixed;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 40px;
            z-index: 20;
            font-size: 12px;
        }
        .volume-slider {
            width: 70px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
        #musicBtn {
            background: #2a235a;
            border: none;
            color: white;
            font-size: 14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .screen { display: none; }
        .active-screen { display: block; }

        .main-menu { text-align: center; padding: 20px 10px; }
        h1 {
            font-size: 48px;
            color: white;
            text-shadow: 0 0 20px rgba(168,85,247,0.5);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .sub { color: #cbcbff; margin-bottom: 48px; font-size: 16px; }
        .start-btn {
            background: linear-gradient(95deg, #a855f7, #6b21a5);
            border: none;
            padding: 14px 28px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 60px;
            width: 80%;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }
        .start-btn:active { transform: scale(0.97); }

        .score-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .scenario-box {
            background: rgba(255,255,255,0.95);
            border-radius: 36px;
            padding: 24px 20px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Animated icon */
        .scenario-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(168,85,247,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .icon-skull {
            font-size: 42px;
            filter: drop-shadow(0 0 5px currentColor);
            animation: pulse 2s infinite;
            color: #a855f7;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; text-shadow: 0 0 0 currentColor; }
            50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 10px currentColor; }
            100% { transform: scale(1); opacity: 0.7; text-shadow: 0 0 0 currentColor; }
        }
        .icon-win { color: #4ade80; }
        .icon-lose { color: #f87171; }
        .icon-epic { color: #fbbf24; animation: pulse 0.8s infinite; }

        .scenario-text {
            font-size: 18px;
            line-height: 1.4;
            color: #0e0c2a;
            font-weight: 500;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 2px solid #8b5cf6;
            margin: 15px 0 10px;
            font-size: 16px;
            background: white;
        }

        button.submit {
            background: #10b981;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        button.submit:active { transform: scale(0.97); }

        .thinking {
            text-align: center;
            color: #ccccee;
            margin: 16px;
            display: none;
        }
        .thinking.active { display: block; }

        .result-area {
            background: rgba(0,0,0,0.6);
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            margin: 20px 0;
            display: none;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(8px);
        }
        .result-area.show { display: block; }
        .win-text { color: #4ade80; font-size: 28px; font-weight: bold; }
        .lose-text { color: #f87171; font-size: 28px; font-weight: bold; }
        .epic-win { color: #fbbf24; font-size: 28px; font-weight: bold; text-shadow: 0 0 8px gold; }
        .result-comment { color: white; margin-top: 8px; font-size: 14px; font-style: italic; }
        .points-earned {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 10px;
            font-size: 12px;
            color: #ffd966;
            display: inline-block;
        }

        .next-btn {
            background: #8b5cf6;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            display: none;
            cursor: pointer;
        }
        .next-btn.show { display: block; }
        .share-btn {
            background: #1da1f2;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            margin-top: 8px;
            display: none;
            cursor: pointer;
        }
        .share-btn.show { display: block; }
        .footer-note { text-align: center; color: #a1a1d0; font-size: 11px; margin-top: 20px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- 3D Floating Words Background (subtle) -->
    <div class="word-cloud" id="wordCloud"></div>

    <div class="game-card">
        <div id="mainMenu" class="screen active-screen">
            <div class="main-menu">
                <h1>⚰️ DEATH BY AI</h1>
                <div class="sub">The AI judge will decide your fate...</div>
                <button class="start-btn" id="startGameBtn">▶ START GAME</button>
                <div class="footer-note">v8.2 · animated icon · quality scoring</div>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div class="score-panel">
                <span>🔥 STREAK: <span id="surviveCount">0</span></span>
                <span>🎮 PLAYS: <span id="gameCount">0</span></span>
                <span>🏆 BEST: <span id="highScoreSpan">0</span></span>
            </div>
            <div class="scenario-box">
                <div class="scenario-icon">
                    <div class="icon-skull" id="scenarioIcon">💀</div>
                </div>
                <div class="scenario-text" id="scenarioText">Loading...</div>
                <input type="text" id="playerAnswer" placeholder="✍️ What's your move?" maxlength="200">
                <button class="submit" id="submitBtn">⚡ FACE JUDGEMENT</button>
            </div>
            <div id="thinkingMsg" class="thinking">🤖 The AI is weighing your destiny...</div>
            <div id="resultArea" class="result-area">
                <div id="resultTitle"></div>
                <div id="resultComment" class="result-comment"></div>
                <div id="pointsDisplay" class="points-earned"></div>
            </div>
            <button id="nextRoundBtn" class="next-btn">🔄 TRY ANOTHER SCENARIO</button>
            <button id="shareBtn" class="share-btn">📢 SHARE YOUR STORY</button>
        </div>
    </div>

    <!-- Music controls -->
    <div class="music-controls">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="15">
        <button id="musicBtn">🔇</button>
    </div>

    <script>
        // ==================== 3D FLOATING WORDS BACKGROUND ====================
        const wordsList = [
            "SURVIVE", "PERISH", "EPIC", "DEATH", "AI", "STREAK", "POINTS", "FATE",
            "JUDGE", "LIVE", "DIE", "CHANCE", "RISK", "FORTUNE", "DESTINY", "LEGEND",
            "VICTORY", "DEFEAT", "GLORY", "HONOR", "CHAOS", "ORDER", "FINAL", "CHOICE"
        ];

        function createFloatingWords() {
            const cloud = document.getElementById('wordCloud');
            const wordCount = 20;
            for (let i = 0; i < wordCount; i++) {
                const word = wordsList[Math.floor(Math.random() * wordsList.length)];
                const span = document.createElement('div');
                span.className = 'floating-word';
                span.textContent = word;
                const size = Math.random() * 30 + 18;
                const left = Math.random() * 100;
                const duration = Math.random() * 25 + 15;
                const delay = Math.random() * -40;
                span.style.fontSize = size + 'px';
                span.style.left = left + '%';
                span.style.animationDuration = duration + 's';
                span.style.animationDelay = delay + 's';
                span.style.opacity = Math.random() * 0.03 + 0.02;
                const colors = ['#a855f7', '#4ade80', '#f87171', '#fbbf24', '#60a5fa', '#c084fc'];
                span.style.color = colors[Math.floor(Math.random() * colors.length)];
                span.style.textShadow = `0 0 8px ${span.style.color}`;
                cloud.appendChild(span);
            }
        }
        createFloatingWords();

        // ==================== GAME LOGIC ====================
        const scenarios = [
            "🐯 A hungry lion in the room. Only weapon: a squeaky hammer.",
            "📱 Phone dead at 2am in an Uber. Driver is lost and speaks no English.",
            "💼 You accidentally 'reply all' to an email roasting your boss. He's right behind you.",
            "🎥 Naked on a video call. Camera was on. Everyone saw.",
            "💔 You liked your ex's 2016 photo while stalking at 3am. They saw it.",
            "🍕 Wrong food delivery. You're starving. Restaurant isn't answering.",
            "🍰 You forgot dessert at dinner. Standing at their door empty-handed.",
            "🚪 Roommate walks in during a private moment. Silence.",
            "✈️ Passport thrown in trash. Flight in 5 hours. Garbage truck already came.",
            "🚂 Wrong train. Won't stop for 4 hours. Destination unknown.",
            "🏠 Airbnb doesn't exist at 2am. Empty lot. No hotels nearby.",
            "🛂 Passport expired. Flight in 45 minutes. At airport security.",
            "🥾 Lost on mountain trail. No signal. Sun is setting.",
            "🏨 Screaming from next hotel room. No staff around.",
            "🕊️ Seagull stole your sandwich. Mocking you from 3 feet away.",
            "🎤 Friend about to sing terribly. They ask your opinion.",
            "💑 Date looks 10 years older than profile pic. First words?",
            "🤐 Friend told you a secret. Their partner asks you directly.",
            "💍 Called current partner by ex's name. During argument.",
            "👀 See your ex with new partner while you're alone at a restaurant.",
            "💬 'Why did your last relationship end?' on first date.",
            "🍝 Friend's cooking is awful. 'How is it?' with hopeful eyes.",
            "🍱 You ate colleague's grandma-recipe lunch. They're crying.",
            "🪔 Grumpy genie offers terrible wishes. What's your first wish?",
            "📦 Smart speaker ordered 100 pizzas. Delivery guy at door.",
            "🦷 Dentist says 'Open wide' while holding giant pliers.",
            "🚗 Car breaks down in the middle of nowhere. 1% battery left.",
            "👻 Ghost appears at 3am. It wants to be friends.",
            "💸 Lottery ticket worth $1M stuck in vending machine.",
            "🐍 Snake in your shoe. Flight boards in 5 minutes.",
            "🌊 Tsunami warning. 10 minutes to evacuate. Cat is hiding.",
            "🕵️ Spy mistakes you for a double agent. Wants secret codes.",
            "🏆 You accidentally won an award. Speech in 2 minutes.",
            "🤖 Robot vacuum locks you in a room. It's charging.",
            "🎂 Cake for your crush completely collapsed.",
            "💀 Cursed artifact whispers your darkest secret.",
            "🚁 Helicopter pilot asks you to navigate. You've never flown.",
            "🎭 On stage. Script is blank. Audience is waiting.",
            "🌵 Lost in desert. You find a cactus with one straw.",
            "🐧 Penguin follows you home. Refuses to leave.",
            "🪄 Magician pulls you on stage. You have to assist the trick.",
            "🎄 You accidentally set the Christmas tree on fire.",
            "📺 Your TV starts talking. Gives investment advice.",
            "🍔 You ate your friend's last burger. They're crying.",
            "🐝 You're allergic to bees. A bee lands on your nose.",
            "🎸 At a concert. Band pulls you on stage to play drums.",
            "🧠 You wake up as a brain in a jar. Scientists observing you.",
            "🛸 Aliens abduct you. They ask you to rate Earth 1-10.",
            "🐙 Giant octopus grabs your boat. It wants to play chess.",
            "💀 Death himself challenges you to rock-paper-scissors."
        ];

        const creativeBonus = ["what if", "maybe", "perhaps", "could", "would", "might", "alternatively", "imagine", "suppose", "consider", "plan", "strategy", "approach", "method", "tactic"];
        const effortIndicators = ["first", "then", "after", "while", "because", "since", "therefore", "however", "instead", "meanwhile", "suddenly", "carefully", "quickly", "slowly", "gently"];
        const surviveKeywords = ["run", "hide", "help", "call", "escape", "fight", "trick", "clever", "smart", "plan", "strategy", "avoid", "dodge", "distract", "bribe", "negotiate", "creative", "genius", "brilliant", "outsmart", "use", "grab", "jump", "climb", "sneak", "defend", "attack", "trap", "patience", "prepare", "tool", "weapon", "item", "fake", "pretend", "convince", "reason", "logic", "improvise", "adapt", "survive", "live", "make it"];
        const perishKeywords = ["cry", "panic", "freeze", "die", "scream", "give up", "pray", "scared", "afraid", "fear", "hopeless", "useless", "can't", "no idea", "don't know", "not sure", "nothing", "stay", "wait", "hesitate", "confused", "lost", "unsure", "stupid", "dumb", "idiot", "fool", "silly", "crazy", "kill", "murder", "death", "dead", "quit", "surrender", "give in", "okay", "fine", "whatever"];

        const winResponses = ["🎉 The AI is IMPRESSED! Your quick thinking saved you!", "✨ BRILLIANT! The universe applauds your genius.", "🔥 You CHEATED DEATH! The AI takes a bow.", "🌟 MASTERFUL! The AI admits you're clever.", "🏆 VICTORY! The AI records your name in the Book of Survivors.", "💪 RESPECT! You've earned a legend status.", "🎭 The AI smiles — that was surprisingly smart.", "⚡ ELECTRIFYING! Death takes a rain check.", "🍀 LUCKY? Maybe. But you SURVIVED!", "🧠 GENIUS MOVE! The AI is genuinely impressed."];
        const loseResponses = ["😬 OOF. That plan... didn't work. Try again?", "💀 The AI shakes its head. Better luck next time.", "🎭 That was... interesting. Not good, but interesting.", "😅 The AI is laughing. Not with you, at you. Try again!", "🧠 The AI expected more. You can do better!", "🔥 That backfired spectacularly. One more try?", "💔 The AI is disappointed. Let's try again.", "😱 That was a bold move. Too bold. Try again!", "🤔 Hmm... The AI thinks you can do better. One more chance?", "🎲 Bad luck? Bad decision? Both? Try again!"];
        const epicWinResponses = ["🏆 EPIC! The AI bows to your brilliance!", "👑 LEGENDARY! You've been added to the Hall of Fame!", "⚡ GOD-TIER! The AI admits defeat!", "🌟 UNBELIEVABLE! A perfect strategy!", "🔥 UNSTOPPABLE! The AI is speechless!"];

        let surviveStreak = 0, totalGames = 0;
        let lastResult = { survived: false, comment: "", points: 0, qualityScore: 0 };
        let highScore = localStorage.getItem('deathAI_hs') ? parseInt(localStorage.getItem('deathAI_hs')) : 0;
        document.getElementById('highScoreSpan').innerText = highScore;

        function updateUI() {
            document.getElementById('surviveCount').innerText = surviveStreak;
            document.getElementById('gameCount').innerText = totalGames;
            document.getElementById('highScoreSpan').innerText = highScore;
        }

        function getRandomScenario() { return scenarios[Math.floor(Math.random() * scenarios.length)]; }
        function loadScenario() {
            document.getElementById('scenarioText').innerText = getRandomScenario();
            document.getElementById('playerAnswer').value = '';
            document.getElementById('playerAnswer').disabled = false;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('nextRoundBtn').classList.remove('show');
            document.getElementById('shareBtn').classList.remove('show');
            // Reset icon to neutral purple
            const icon = document.getElementById('scenarioIcon');
            icon.className = 'icon-skull';
            icon.style.color = '#a855f7';
        }

        function isRandomGarbage(answer) {
            const garbagePattern = /^[a-zA-Z]{1,10}$/;
            const noVowels = !/[aeiou]/i.test(answer);
            const onlyConsonants = /^[bcdfghjklmnpqrstvwxyz]+$/i.test(answer);
            const tooShort = answer.length < 3 && answer.length > 0;
            const gibberish = /(.)\1{4,}/.test(answer);
            return (garbagePattern.test(answer) && answer.length > 1) || noVowels || onlyConsonants || tooShort || gibberish;
        }

        function calculateQuality(answer) {
            let qualityScore = 0;
            const words = answer.toLowerCase().split(/\s+/);
            if (answer.length > 30) qualityScore += 5;
            if (answer.length > 60) qualityScore += 8;
            if (answer.length > 100) qualityScore += 12;
            if (words.length > 5) qualityScore += 4;
            if (words.length > 10) qualityScore += 8;
            creativeBonus.forEach(word => { if (answer.toLowerCase().includes(word)) qualityScore += 3; });
            effortIndicators.forEach(word => { if (answer.toLowerCase().includes(word)) qualityScore += 2; });
            if ((answer.match(/[.!?]/g) || []).length > 1) qualityScore += 3;
            surviveKeywords.forEach(kw => { if (answer.toLowerCase().includes(kw)) qualityScore += 1; });
            return Math.min(qualityScore, 50);
        }

        function judge(answer) {
            if (isRandomGarbage(answer)) {
                return { survived: false, comment: "🧠 The AI detected random nonsense. Put some thought into it next time! 🧠", qualityScore: 0, pointsEarned: 0 };
            }

            let surviveScore = 0, perishScore = 0;
            const low = answer.toLowerCase();
            surviveKeywords.forEach(k => { if(low.includes(k)) surviveScore += 2; });
            perishKeywords.forEach(k => { if(low.includes(k)) perishScore += 2; });
            const qualityScore = calculateQuality(answer);
            surviveScore += Math.floor(qualityScore / 3);
            if (answer.length > 55) surviveScore += 3;
            if (answer.length < 7) perishScore += 2;
            creativeBonus.forEach(c => { if(low.includes(c)) surviveScore += 2; });
            const panicWords = ['!','?','help','ahh','oh no','omg','god','no way','what','huh'];
            panicWords.forEach(p => { if(low.includes(p)) perishScore += 1; });

            let survived;
            let pointMultiplier = 1;
            if (surviveScore > perishScore + 4) { survived = true; pointMultiplier = 2; }
            else if (perishScore > surviveScore + 4) { survived = false; pointMultiplier = 0.5; }
            else { survived = Math.random() > 0.45; pointMultiplier = survived ? 1.2 : 0.8; }

            let pointsEarned = Math.floor((qualityScore + surviveScore) * pointMultiplier);
            pointsEarned = Math.min(pointsEarned, 25);

            let comment;
            if (qualityScore > 35 && survived) { comment = epicWinResponses[Math.floor(Math.random() * epicWinResponses.length)]; }
            else if (survived) { comment = winResponses[Math.floor(Math.random() * winResponses.length)]; }
            else { comment = loseResponses[Math.floor(Math.random() * loseResponses.length)]; }

            if (qualityScore > 30) comment += " ⭐ Exceptional strategy!";
            else if (qualityScore > 15) comment += " 💡 Good thinking!";
            else if (qualityScore < 5 && survived) comment += " 🤔 You got lucky this time!";

            return { survived, comment, qualityScore, pointsEarned };
        }

        function shareResult() {
            const gameUrl = "https://smuhammadsaim555-prog.github.io/deathbyai/";
            const resultText = lastResult.survived ?
                `🎉 I SURVIVED in Death by AI! Score: ${lastResult.qualityScore} pts | Streak: ${surviveStreak}\n\nCan you beat me? ${gameUrl}` :
                `💀 I PERISHED in Death by AI... Score: ${lastResult.qualityScore} pts\n\nTry to survive: ${gameUrl}`;
            if (navigator.share) {
                navigator.share({ title: 'Death by AI', text: resultText, url: gameUrl }).catch(() => { prompt("Copy this link and share:", resultText); });
            } else { prompt("Copy this link and share:", resultText); }
        }

        function submitAnswer() {
            const answer = document.getElementById('playerAnswer').value.trim();
            if(!answer) { alert("✍️ Write something! The AI is waiting."); return; }
            document.getElementById('playerAnswer').disabled = true;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('thinkingMsg').classList.add('active');
            setTimeout(() => {
                document.getElementById('thinkingMsg').classList.remove('active');
                const result = judge(answer);
                lastResult = result;
                totalGames++;
                if(result.survived) { surviveStreak += result.pointsEarned > 0 ? result.pointsEarned : 1; if(surviveStreak > highScore) { highScore = surviveStreak; localStorage.setItem('deathAI_hs', highScore); } }
                else { surviveStreak = Math.max(0, surviveStreak - 2); }
                updateUI();

                // Update animated icon based on result
                const icon = document.getElementById('scenarioIcon');
                icon.className = 'icon-skull';
                if(result.qualityScore > 35 && result.survived) {
                    icon.classList.add('icon-epic');
                    icon.style.color = '#fbbf24';
                } else if(result.survived) {
                    icon.classList.add('icon-win');
                    icon.style.color = '#4ade80';
                } else {
                    icon.classList.add('icon-lose');
                    icon.style.color = '#f87171';
                }

                const titleDiv = document.getElementById('resultTitle');
                if(result.qualityScore > 35 && result.survived) { titleDiv.className = 'epic-win'; titleDiv.innerText = '🏆 EPIC VICTORY! 🏆'; }
                else if(result.survived) { titleDiv.className = 'win-text'; titleDiv.innerText = '✨ VICTORY! ✨'; }
                else { titleDiv.className = 'lose-text'; titleDiv.innerText = '💀 DEFEATED 💀'; }
                document.getElementById('resultComment').innerText = result.comment;
                document.getElementById('pointsDisplay').innerHTML = `📊 Answer Quality: ${result.qualityScore} pts | +${result.pointsEarned} streak points`;
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('nextRoundBtn').classList.add('show');
                document.getElementById('shareBtn').classList.add('show');
            }, 1200);
        }

        function startGame() {
            document.getElementById('mainMenu').classList.remove('active-screen');
            document.getElementById('gameScreen').classList.add('active-screen');
            surviveStreak = 0; totalGames = 0;
            updateUI();
            loadScenario();
        }

        // ==================== MUSIC ====================
        let audioCtx = null, musicActive = false, musicOscs = [];
        let masterGain = null;

        function initMusic() {
            if(audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.05;
                masterGain.connect(audioCtx.destination);
                const freqs = [196, 261, 329, 392, 440];
                freqs.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = f;
                    let gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.03;
                    osc.connect(gainNode);
                    gainNode.connect(masterGain);
                    musicOscs.push(osc);
                });
                const volumeSlider = document.getElementById('volumeSlider');
                volumeSlider.addEventListener('input', function(e) {
                    if(masterGain) masterGain.gain.value = e.target.value / 1000;
                });
            } catch(e) {}
        }

        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            if(!audioCtx) initMusic();
            if(!audioCtx) return;
            if(audioCtx.state === 'suspended' || !musicActive) {
                audioCtx.resume().then(() => {
                    musicOscs.forEach(osc => { try { osc.start(); } catch(e) {} });
                    musicActive = true;
                    btn.innerText = '🔊';
                    btn.style.background = '#5b21b6';
                    if(masterGain) masterGain.gain.value = document.getElementById('volumeSlider').value / 1000;
                });
            } else {
                audioCtx.suspend();
                musicActive = false;
                btn.innerText = '🔇';
                btn.style.background = '#2a235a';
            }
        }

        document.addEventListener('touchstart', () => { if(!audioCtx) initMusic(); }, { once: true });
        document.getElementById('musicBtn').onclick = toggleMusic;
        document.getElementById('startGameBtn').onclick = startGame;
        document.getElementById('submitBtn').onclick = submitAnswer;
        document.getElementById('nextRoundBtn').onclick = () => { loadScenario(); };
        document.getElementById('shareBtn').onclick = shareResult;
    </script>
</body>
</html>
